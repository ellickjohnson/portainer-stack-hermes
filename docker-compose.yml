version: "3.8"

services:
  hermes:
    image: ghcr.io/ellickjohnson/hermes:latest
    container_name: hermes
    restart: unless-stopped
    ports:
      - "7681:7681"
    volumes:
      - hermes_data:/root/.hermes
    environment:
      - TZ=America/Denver
    stdin_open: true
    tty: true

volumes:
  hermes_data:
