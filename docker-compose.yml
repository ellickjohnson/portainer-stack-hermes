services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
    volumes:
      - hermes_data:/opt/data
    environment:
      - TZ=America/Denver
      - TELEGRAM_POLL_TIMEOUT=60
      - TELEGRAM_RETRY_ATTEMPTS=15
      - TERMINAL_BACKEND=docker
      
volumes:
  hermes_data:
